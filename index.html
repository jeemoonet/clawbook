<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ClawBook 文档索引</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root {
      --bg: #f8f9fa;
      --surface: #ffffff;
      --border: #e5e7eb;
      --text: #1f2937;
      --text-muted: #6b7280;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --font-sans: "SF Pro Text", "PingFang SC", "Microsoft YaHei", sans-serif;
      --font-mono: "SF Mono", "Cascadia Code", "Consolas", monospace;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: var(--font-sans);
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .layout {
      display: flex;
      flex: 1;
      min-height: 0;
    }
    .sidebar {
      width: 280px;
      min-width: 280px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      overflow-y: auto;
      padding: 1rem 0;
    }
    .sidebar h2 {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      margin: 0 1rem 0.75rem;
      padding: 0;
    }
    .sidebar ul { list-style: none; margin: 0; padding: 0; }
    .sidebar li { margin: 0; }
    .sidebar a {
      display: block;
      padding: 0.4rem 1rem;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.9rem;
      border-left: 2px solid transparent;
      margin-left: 0;
    }
    .sidebar a:hover { color: var(--text); background: rgba(0,0,0,0.04); }
    .sidebar a.active { color: var(--accent); border-left-color: var(--accent); background: rgba(37,99,235,0.08); }
    .sidebar .folder { margin-top: 0.25rem; }
    .sidebar .folder-toggle {
      display: flex;
      align-items: center;
      padding: 0.4rem 1rem;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-muted);
      cursor: pointer;
      user-select: none;
      border-left: 2px solid transparent;
    }
    .sidebar .folder-toggle:hover { color: var(--text); background: rgba(0,0,0,0.04); }
    .sidebar .folder-toggle .icon {
      width: 1rem;
      margin-right: 0.35rem;
      transition: transform 0.2s ease;
    }
    .sidebar .folder.collapsed .folder-toggle .icon { transform: rotate(-90deg); }
    .sidebar .folder-body { overflow: hidden; }
    .sidebar .folder.collapsed .folder-body { display: none; }
    .sidebar .folder-body ul { padding-left: 0.5rem; }
    .main {
      flex: 1;
      overflow-y: auto;
      padding: 2rem 3rem 4rem;
      max-width: 52rem;
      margin: 0 auto;
      background: var(--surface);
      border-radius: 8px 0 0 0;
      box-shadow: -1px 0 0 var(--border);
    }
    .main .placeholder {
      color: var(--text-muted);
      text-align: center;
      padding: 4rem 2rem;
      font-size: 1rem;
    }
    .main .content {
      font-size: 1rem;
    }
    .main .content h1 { font-size: 1.75rem; margin-top: 0; margin-bottom: 1rem; }
    .main .content h2 { font-size: 1.35rem; margin-top: 1.5rem; margin-bottom: 0.75rem; }
    .main .content h3 { font-size: 1.15rem; margin-top: 1.25rem; margin-bottom: 0.5rem; }
    .main .content pre, .main .content code {
      font-family: var(--font-mono);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
    }
    .main .content pre { padding: 1rem; overflow-x: auto; }
    .main .content code { padding: 0.2em 0.4em; font-size: 0.9em; }
    .main .content pre code { padding: 0; background: none; border: none; }
    .main .content table {
      border-collapse: collapse;
      width: 100%;
      font-size: 0.9rem;
    }
    .main .content th, .main .content td {
      border: 1px solid var(--border);
      padding: 0.5rem 0.75rem;
      text-align: left;
    }
    .main .content th { background: var(--bg); color: var(--text-muted); font-weight: 600; }
    .main .content a { color: var(--accent); text-decoration: none; }
    .main .content a:hover { text-decoration: underline; }
    .main .content blockquote {
      border-left: 4px solid var(--accent);
      margin: 1rem 0;
      padding: 0.5rem 0 0.5rem 1rem;
      color: var(--text-muted);
    }
    .main .content hr { border: none; border-top: 1px solid var(--border); margin: 1.5rem 0; }
    .main .content ul, .main .content ol { padding-left: 1.5rem; }
    .loading { color: var(--text-muted); }
    .error { color: #dc2626; }
    header {
      padding: 0.75rem 1rem;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      font-weight: 600;
      font-size: 1rem;
    }
  </style>
</head>
<body>
  <header>ClawBook 文档索引</header>
  <div class="layout">
    <nav class="sidebar">
      <h2>根目录</h2>
      <ul id="nav-root"></ul>
      <div class="folder" id="folder-kb">
        <div class="folder-toggle" aria-expanded="true"><span class="icon">▼</span> KB 企业应用手册</div>
        <div class="folder-body"><ul id="nav-kb"></ul></div>
      </div>
      <div class="folder" id="folder-skills">
        <div class="folder-toggle" aria-expanded="true"><span class="icon">▼</span> KB / skills</div>
        <div class="folder-body"><ul id="nav-skills"></ul></div>
      </div>
    </nav>
    <main class="main">
      <div id="placeholder" class="placeholder">请在左侧选择一篇文档</div>
      <div id="content" class="content" style="display:none;"></div>
      <div id="loading" class="loading" style="display:none;">加载中…</div>
      <div id="error" class="error" style="display:none;"></div>
    </main>
  </div>
  <script>
    const FILES = [
      "OpenClawBook.md",
      "KB/index.md",
      "KB/01-控制面板Dashboard.md",
      "KB/02-安装与运行.md",
      "KB/03-飞书应用创建与发布.md",
      "KB/04-Agent人格与记忆.md",
      "KB/05-多团队与多Agent.md",
      "KB/06-安全与合规.md",
      "KB/07-飞书企业应用场景.md",
      "KB/08-运维与故障排查.md",
      "KB/09-技能skills.md",
      "KB/skills/index.md",
      "KB/skills/agent-browser.md",
      "KB/skills/automation-workflows.md",
      "KB/skills/baidu-search.md",
      "KB/skills/cron.md",
      "KB/skills/feishu-api-bitable.md",
      "KB/skills/feishu-bitable-creator.md",
      "KB/skills/feishu-calendar-tool.md",
      "KB/skills/feishu-calendar.md",
      "KB/skills/feishu-interactive-cards.md",
      "KB/skills/multi-search-engine.md",
      "KB/skills/nano-banana-pro.md",
      "KB/skills/ontology.md",
      "KB/skills/self-improving-agent.md",
      "KB/skills/skill-vetter-spclaudehome.md",
      "KB/skills/skill-vetter.md",
      "KB/skills/summarize.md",
      "KB/skills/tavily-search.md",
      "KB/skills/youtube-watcher.md"
    ];

    function groupFiles() {
      const root = [], kb = [], skills = [];
      for (const p of FILES) {
        if (p.startsWith("KB/skills/")) skills.push(p);
        else if (p.startsWith("KB/")) kb.push(p);
        else root.push(p);
      }
      return { root, kb, skills };
    }

    function renderNav(containerId, list) {
      const el = document.getElementById(containerId);
      if (!el) return;
      el.innerHTML = list.map(path => {
        const label = path.split("/").pop().replace(/\.md$/i, "");
        return `<li><a href="#" data-path="${path}">${escapeHtml(label)}</a></li>`;
      }).join("");
    }

    function escapeHtml(s) {
      const div = document.createElement("div");
      div.textContent = s;
      return div.innerHTML;
    }

    const groups = groupFiles();
    renderNav("nav-root", groups.root);
    renderNav("nav-kb", groups.kb);
    renderNav("nav-skills", groups.skills);

    const placeholder = document.getElementById("placeholder");
    const content = document.getElementById("content");
    const loading = document.getElementById("loading");
    const errEl = document.getElementById("error");

    marked.setOptions({ gfm: true, breaks: true });

    function show(el) { el.style.display = ""; }
    function hide(el) { el.style.display = "none"; }

    function setActive(path) {
      document.querySelectorAll(".sidebar a").forEach(a => {
        a.classList.toggle("active", a.getAttribute("data-path") === path);
      });
    }

    async function loadMd(path) {
      hide(placeholder);
      hide(content);
      hide(errEl);
      show(loading);
      setActive(path);
      history.replaceState(null, "", "#" + encodeURIComponent(path));
      try {
        const res = await fetch(path);
        if (!res.ok) throw new Error(res.status + " " + res.statusText);
        const raw = await res.text();
        content.innerHTML = marked.parse(raw);
        show(content);
      } catch (e) {
        errEl.textContent = "加载失败：" + e.message + "。请通过本地服务器打开本页面（如 npx serve、Live Server）。";
        show(errEl);
      } finally {
        hide(loading);
      }
    }

    document.querySelectorAll(".sidebar").forEach(sidebar => {
      sidebar.addEventListener("click", (e) => {
        const toggle = e.target.closest(".folder-toggle");
        if (toggle) {
          const folder = toggle.closest(".folder");
          if (folder) {
            folder.classList.toggle("collapsed");
            toggle.setAttribute("aria-expanded", folder.classList.contains("collapsed") ? "false" : "true");
          }
          return;
        }
        const a = e.target.closest("a[data-path]");
        if (!a) return;
        e.preventDefault();
        loadMd(a.getAttribute("data-path"));
      });
    });

    const hash = location.hash.slice(1);
    if (hash && FILES.includes(decodeURIComponent(hash))) {
      loadMd(decodeURIComponent(hash));
    }
    window.addEventListener("popstate", () => {
      const h = location.hash.slice(1);
      if (h && FILES.includes(decodeURIComponent(h))) loadMd(decodeURIComponent(h));
    });
  </script>
</body>
</html>
